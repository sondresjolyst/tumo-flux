name: Code scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Wednesday at 00:00 UTC.
    - cron: 0 0 * * 3
      timezone: "Europe/Oslo"

permissions: {}

jobs:
  github-actions:
    # Scan GitHub Actions workflow files for security vulnerabilities.
    name: GitHub Actions
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@c1be86e02c64b0d2db5c2dba532b5580cdce168d # v9.38.0
