apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitor
spec:
  chart:
    spec:
      version: ${GRAFANA_VERSION} # Set in postBuild production
  values:
    env:
      GF_DATABASE_HOST: postgresql-prod.tumogroup.com:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana-prod
    plugins:
      - volkovlabs-image-panel
      - yesoreyeram-infinity-datasource
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            url: http://loki.monitor.svc.cluster.local:3100
            access: proxy
            isDefault: false
