apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nstuning-app
  namespace: nstuning-dev
spec:
  chart:
    spec:
      chart: nstuning-app
      version: ${NSTUNING_APP_VERSION} # Set in postBuild production
  values:
    env:
      - name: NEXTAUTH_SECRET
        secretKeyRef:
          key: NEXTAUTH_SECRET
          name: nstuning-app-secrets
      - name: NEXTAUTH_URL
        secretKeyRef:
          key: NEXTAUTH_URL
          name: nstuning-app-secrets
      - name: NSTUNING_API_JWT_SECRET
        secretKeyRef:
          key: NSTUNING_API_JWT_SECRET
          name: nstuning-app-secrets
    image:
      tag: "dev"
      pullPolicy: Always
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - host: dev.nstuning.no
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: nstuning-app-tls
          hosts:
            - dev.nstuning.no
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        cpu: "500m"
---
