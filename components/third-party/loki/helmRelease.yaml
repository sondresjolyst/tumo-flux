apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitor
spec:
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: xx # Set by flux patch
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      compactor:
        retention_enabled: true
      limits_config:
        retention_period: 2160h
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
    singleBinary:
      replicas: 1
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
      persistence:
        storageClass: nfs
        size: 20Gi
    gateway:
      enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
