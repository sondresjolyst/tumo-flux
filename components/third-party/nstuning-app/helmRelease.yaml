apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nstuning-app
  namespace: nstuning-dev
spec:
  releaseName: nstuning-app
  chart:
    spec:
      chart: nstuning-app
      version: xx # Set by flux patch
      sourceRef:
        kind: HelmRepository
        name: tumogroup
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        cpu: "500m"
---
