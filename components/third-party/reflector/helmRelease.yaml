apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: kube-system
spec:
  releaseName: reflector
  chart:
    spec:
      chart: reflector
      version: xx # Set by flux patch
      sourceRef:
        kind: HelmRepository
        name: reflector
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/emberstack/kubernetes-reflector
